<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="glass-panel login-box">
        <h2>Smart Attendance</h2>
        <div id="alert" class="alert"></div>
        <form id="loginForm">
            <input type="text" id="username" class="glass-input" placeholder="Username" required>
            <input type="password" id="password" class="glass-input" placeholder="Password" required>
            <button type="submit" class="glass-btn">Login</button>
        </form>
        <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-direction: column;">
            <a href="register.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">Student Self Registration</a>
            <a href="attendance.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">Go to Live Camera Attendance</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            await login(user, pass);
        });
        
        // Auto redirect if already logged in
        if(getToken()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
