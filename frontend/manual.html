<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Attendance - Smart Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">Smart Attendance</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="manual.html" class="active">Manual Marking</a>
            <a href="#" onclick="exportReport()">Export CSV</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 2rem;">Manual Attendance Marking</h2>
        <div id="alert" class="alert"></div>

        <div class="glass-panel">
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <input type="text" id="searchInput" class="glass-input" style="margin-bottom: 0;" placeholder="Search by USN or Name...">
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>USN</th>
                        <th>Section</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="students_table">
                    <!-- Students will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let allStudents = [];

        async function loadStudents() {
            try {
                const response = await fetchWithAuth('/students/');
                if(response) {
                    allStudents = await response.json();
                    renderStudents(allStudents);
                }
            } catch(e) {
                console.error("Error loading students", e);
            }
        }

        function renderStudents(students) {
            const tbody = document.getElementById('students_table');
            tbody.innerHTML = '';
            
            students.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.full_name}</td>
                    <td>${student.usn}</td>
                    <td>${student.section}</td>
                    <td>
                        <button class="glass-btn" style="padding: 0.25rem 0.75rem; width: auto; background: var(--success-color);" onclick="markAttendance(${student.id}, 'Present')">P</button>
                        <button class="glass-btn" style="padding: 0.25rem 0.75rem; width: auto; background: var(--error-color);" onclick="markAttendance(${student.id}, 'Absent')">A</button>
                        <button class="glass-btn" style="padding: 0.25rem 0.75rem; width: auto; background: #f59e0b;" onclick="markAttendance(${student.id}, 'Late')">L</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allStudents.filter(s => 
                s.full_name.toLowerCase().includes(term) || 
                s.usn.toLowerCase().includes(term)
            );
            renderStudents(filtered);
        });

        async function markAttendance(studentId, status) {
            try {
                const response = await fetchWithAuth('/attendance/mark_manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ student_id: studentId, status: status })
                });
                
                if(response && response.ok) {
                    showAlert(`Marked ${status} successfully!`, 'success');
                } else {
                    showAlert("Failed to mark attendance", 'error');
                }
            } catch(err) {
                showAlert("Network error", 'error');
            }
        }

        window.onload = loadStudents;
    </script>
</body>
</html>
