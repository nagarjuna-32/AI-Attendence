<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Smart Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        .register-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            .register-container {
                grid-template-columns: 1fr;
            }
        }
        .captured-images {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .captured-images img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
        }
        .step-text {
            text-align: center;
            margin-top: 1rem;
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Smart Attendance</a>
        <div class="nav-links">
            <a href="index.html">Login</a>
            <a href="attendance.html">Live Attendance</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Secure Student Registration</h2>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="register-container">
            <div class="glass-panel">
                <h3 style="margin-bottom: 1.5rem;">Step 1: Face & Liveness Verification</h3>
                <div class="camera-container" style="max-width: 100%;">
                    <video id="video" autoplay playsinline></video>
                    <!-- Hidden canvas for capturing -->
                    <canvas id="captureCanvas" style="display:none;"></canvas>
                </div>
                <div class="step-text" id="instructionText">Initializing Camera...</div>
                
                <div class="captured-images" id="imageGallery"></div>
            </div>

            <div class="glass-panel" style="opacity: 0.5; pointer-events: none;" id="formContainer">
                <h3 style="margin-bottom: 1.5rem;">Step 2: Student Details</h3>
                <form id="registerForm">
                    <input type="text" id="full_name" class="glass-input" placeholder="Full Name" required>
                    <input type="text" id="usn" class="glass-input" placeholder="USN / Roll Number" required>
                    <input type="text" id="department" class="glass-input" placeholder="Department" required>
                    <input type="text" id="semester" class="glass-input" placeholder="Semester" required>
                    <input type="text" id="section" class="glass-input" placeholder="Section" required>
                    <input type="email" id="email" class="glass-input" placeholder="Email" required>
                    <input type="text" id="phone" class="glass-input" placeholder="Phone Number" required>
                    
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <input type="checkbox" id="consent" required>
                        <label for="consent" style="font-size: 0.8rem; color: var(--text-secondary);">I agree to register my face and eye data for secure attendance purposes.</label>
                    </div>

                    <button type="submit" class="glass-btn" id="submitBtn">Complete Registration</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const videoElement = document.getElementById('video');
        const captureCanvas = document.getElementById('captureCanvas');
        const ctx = captureCanvas.getContext('2d');
        const instructionText = document.getElementById('instructionText');
        const progressBar = document.getElementById('progressBar');
        const imageGallery = document.getElementById('imageGallery');
        const formContainer = document.getElementById('formContainer');
        const registerForm = document.getElementById('registerForm');
        
        let currentState = 'INITIALIZING'; // INITIALIZING, WAITING_BLINK, CAPTURING, DONE
        let blinkDetected = false;
        let eyeVerified = false;
        let capturedBlobs = [];
        
        // EAR Calculation function
        function calculateEAR(landmarks, leftIndices, rightIndices) {
            const distance = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
            
            const leftEAR = (distance(landmarks[leftIndices[1]], landmarks[leftIndices[5]]) + 
                             distance(landmarks[leftIndices[2]], landmarks[leftIndices[4]])) / 
                            (2.0 * distance(landmarks[leftIndices[0]], landmarks[leftIndices[3]]));
                            
            const rightEAR = (distance(landmarks[rightIndices[1]], landmarks[rightIndices[5]]) + 
                              distance(landmarks[rightIndices[2]], landmarks[rightIndices[4]])) / 
                             (2.0 * distance(landmarks[rightIndices[0]], landmarks[rightIndices[3]]));
                             
            return (leftEAR + rightEAR) / 2.0;
        }

        const LEFT_EYE = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
        const EAR_THRESHOLD = 0.20;

        function onResults(results) {
            if (currentState === 'DONE') return;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                if (currentState === 'INITIALIZING') {
                    currentState = 'WAITING_BLINK';
                    instructionText.textContent = "Face Detected! Please blink your eyes once.";
                    progressBar.style.width = "25%";
                }

                if (currentState === 'WAITING_BLINK') {
                    const landmarks = results.multiFaceLandmarks[0];
                    const ear = calculateEAR(landmarks, LEFT_EYE, RIGHT_EYE);
                    
                    if (ear < EAR_THRESHOLD) {
                        blinkDetected = true;
                    } else if (blinkDetected && ear > EAR_THRESHOLD + 0.05) {
                        // Complete blink cycle (closed then opened)
                        currentState = 'CAPTURING';
                        eyeVerified = true;
                        instructionText.textContent = "Blink verified! Capturing face (hold still)...";
                        progressBar.style.width = "50%";
                        startCaptureSequence();
                    }
                }
            } else {
                if (currentState === 'WAITING_BLINK') {
                    instructionText.textContent = "No face detected. Please look at the camera.";
                }
            }
        }

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();

        function startCaptureSequence() {
            captureCanvas.width = videoElement.videoWidth;
            captureCanvas.height = videoElement.videoHeight;
            
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 3) {
                    clearInterval(interval);
                    currentState = 'DONE';
                    instructionText.textContent = "Face captured successfully! Please fill details.";
                    instructionText.style.color = "var(--success-color)";
                    progressBar.style.width = "75%";
                    formContainer.style.opacity = "1";
                    formContainer.style.pointerEvents = "auto";
                    return;
                }
                
                ctx.drawImage(videoElement, 0, 0);
                captureCanvas.toBlob((blob) => {
                    capturedBlobs.push(blob);
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    imageGallery.appendChild(img);
                }, 'image/jpeg');
                
                count++;
            }, 600); // Capture every 600ms
        }

        // Form Submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Uploading...";
            
            const formData = new FormData();
            formData.append('full_name', document.getElementById('full_name').value);
            formData.append('usn', document.getElementById('usn').value.toUpperCase());
            formData.append('department', document.getElementById('department').value);
            formData.append('semester', document.getElementById('semester').value);
            formData.append('section', document.getElementById('section').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('eye_verified', eyeVerified);
            
            capturedBlobs.forEach((blob, i) => {
                formData.append('images', blob, `face_${i}.jpg`);
            });
            
            try {
                const response = await fetch(`${API_BASE}/students/register`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if(response.ok) {
                    showToast("Registration successful! Redirecting to login...", "success");
                    progressBar.style.width = "100%";
                    setTimeout(() => window.location.href = "index.html", 2000);
                } else {
                    showToast(data.detail || "Registration failed", "error");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Complete Registration";
                }
            } catch(err) {
                showToast("Network error", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Complete Registration";
            }
        });
    </script>
</body>
</html>
